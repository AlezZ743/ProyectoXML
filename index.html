<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz: XML & DTD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <div class="main-wrapper">
        <header class="main-header">
            <h1>Interactive Quiz</h1>
            <p>Pon a prueba tus conocimientos técnicos</p>
        </header>

        <div id="setup" class="card">
            <div class="lang-selector">
                <label for="lang">Selecciona Idioma / Select Language:</label>
                <select id="lang">
                    <option value="es">Español 🇪🇸</option>
                    <option value="en">English 🇬🇧</option>
                </select>
            </div>
            
            <div class="menu-buttons">
                <button class="btn-primary" onclick="startQuiz('xml/test_xml.xml')">
                    <span>Iniciación a XML</span>
                </button>
                <button class="btn-primary" onclick="startQuiz('xml/test_dtd.xml')">
                    <span>Estructura DTD</span>
                </button>
            </div>
        </div>

        <div id="quiz-container" class="card hidden">
            <div id="header-quiz">
                <div class="stat">
                    <span class="label">Tiempo:</span>
                    <span id="timer" class="value">00:00</span>
                </div>
                <div class="stat">
                    <span id="score-display" class="value"></span>
                </div>
            </div>

            <div class="progress-bar-container">
                <div id="progress-bar" style="width: 0%"></div>
            </div>

            <div id="question-box">
                </div>

            <div id="choices-box">
                </div>

            <div class="footer-quiz">
                <button id="next-btn" onclick="nextQuestion()" class="btn-next hidden">Siguiente</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
